# Matrice de compatibilité inter-librairies
# Mise à jour par le Release Manager lors de chaque validation d'intégration.
#
# Côté PRODUCTEUR : baobab-auth-core expose des contrats à des briques aval.
# Validation par git-ref sur version/vX.Y.Z ; chaque consommateur reporte
# PASSED/FAILED ici + rapport dans docs/integrations/reports/.

library: baobab-auth-core
version: v0.5.1

# Jalon v0.5.1 : republication PyPI de v0.5.0 (même code).
# Ordre de validation : database → security → api → client → admin.
# INTEGRATION_VALIDATED lorsque les 5 consommateurs required ont PASSED.

validated_consumers:
  - order: 1
    name: baobab-auth-database
    contract: database
    version: v0.2.0
    status: PASSED
    required: true
    integration_method: git_ref
    ref: version/v0.2.0
    validated_at: "2026-06-28"
    validation_type:
      - import_tests
      - contract_tests
      - integration_tests
      - catalog_diagnostics_tests
    report: docs/integrations/reports/baobab-auth-core-v0.5.1__baobab-auth-database-v0.2.0.md
    validated_features:
      - UserRepository
      - RoleRepository
      - PermissionRepository
      - SessionRepository
      - AuditRepository
      - UnitOfWork
      - DefaultAuthCatalog
      - AuthCatalogChecksum
      - AuthCatalogDiagnostics
      - catalog check seed report CLI
      - auth_catalog_versions persistence
      - SERVICE role without permissions
      - SUPER_ADMIN all core permissions
    notes: >
      MVP v0.1.0 puis catalogue versionné v0.2.0 (profil core_051).
      Dépendance PyPI baobab-auth-core>=0.5.1,<0.6.0.
      Rapport v0.1.0 : baobab-auth-core-v0.5.1__baobab-auth-database-v0.1.0.md

  - order: 2
    name: baobab-auth-security
    contract: security
    version: v0.1.0
    status: PASSED
    required: true
    integration_method: git_ref
    ref: version/v0.1.0
    validated_at: "2026-06-30"
    validation_type:
      - import_tests
      - contract_tests
      - integration_tests
    report: docs/integrations/reports/baobab-auth-core-v0.5.1__baobab-auth-security-v0.1.0.md
    validated_features:
      - PasswordHasher
      - TokenProvider
      - TokenClaims
      - TokenPair
      - TokenId
      - PlainPassword
      - PasswordHash
      - TokenInvalidError
      - TokenExpiredError
      - CorePasswordHasherAdapter
      - CoreTokenProviderAdapter
      - CoreClaimsMapper
      - CoreTokenPairMapper
      - CoreRevocationAdapter
    notes: >
      Argon2id, JWT RS256, refresh opaques, JWKS local, adaptateurs ports réels
      synchrones. Dépendance PyPI baobab-auth-core>=0.4.0,<1.0.0.
      Rapport consommateur : baobab-auth-security
      docs/integrations/reports/baobab-auth-core-v0.5.1__baobab-auth-security-v0.1.0.md

  - order: 3
    name: baobab-auth-api
    contract: api
    version: PENDING
    status: PENDING
    required: true
    integration_method: git_ref
    ref: version/v0.5.1
    validation_type:
      - import_tests
      - contract_tests
      - integration_tests
    report: null
    notes: >
      Cas d'usage par endpoint ; dépend de database + security.

  - order: 4
    name: baobab-auth-client
    contract: client
    version: PENDING
    status: PENDING
    required: true
    integration_method: git_ref
    ref: version/v0.5.1
    validation_type:
      - import_tests
      - contract_tests
    report: null
    notes: >
      AuthContext / AuthenticatedUser / TokenClaims.

  - order: 5
    name: baobab-auth-admin
    contract: admin
    version: PENDING
    status: PENDING
    required: true
    integration_method: git_ref
    ref: version/v0.5.1
    validation_type:
      - import_tests
      - contract_tests
      - integration_tests
    report: null
    notes: >
      BootstrapSuperAdmin, Disable/EnableUser, RequestJwkRotation, listes admin.

validated_dependencies: []
