name: CI

on:
  push:
    branches: [main, "version/**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Qualité (black + ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.13
      - run: uv sync --frozen
      - name: Black (format check)
        run: uv run black --check src tests
      - name: Ruff (lint)
        run: uv run ruff check src tests

  typing:
    name: Typage (mypy strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.13
      - run: uv sync --frozen
      - run: uv run mypy src

  security:
    name: Sécurité (bandit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.13
      - run: uv sync --frozen
      - name: Bandit (SARIF)
        run: uv run bandit -c pyproject.toml -r src -f sarif -o bandit.sarif
        continue-on-error: true
      - name: Publier SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit.sarif
      - name: Bandit (gate)
        run: uv run bandit -c pyproject.toml -r src

  tests:
    name: Tests + couverture ≥ 95 %
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.13
      - run: uv sync --frozen
      - name: pytest
        run: uv run pytest --cov=src --cov-report=term-missing --cov-report=xml --cov-fail-under=95 --junitxml=junit.xml
      - name: Upload rapports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            junit.xml
            coverage.xml
          retention-days: 14

  commit-policy:
    name: Politique de commit (anti-attribution IA)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Vérifier les messages de commit
        run: |
          git log origin/${{ github.base_ref }}..HEAD --format='%B' \
            > /tmp/pr_commits.txt
          python scripts/check_no_ai_attribution.py /tmp/pr_commits.txt

  build:
    name: Build package
    runs-on: ubuntu-latest
    needs: [quality, typing, security, tests]
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.13
      - run: uv sync --frozen
      - name: Build (sdist + wheel)
        run: uv build
      - name: Twine check
        run: uv run twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist-ci
          path: dist/
          retention-days: 7
